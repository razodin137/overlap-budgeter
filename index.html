<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='%23161616' stroke='%233a86ff' stroke-width='9'/><line x1='50' y1='50' x2='50' y2='26' stroke='%233a86ff' stroke-width='9' stroke-linecap='round'/><line x1='50' y1='50' x2='68' y2='50' stroke='%233a86ff' stroke-width='9' stroke-linecap='round'/></svg>">
    <title>Overlap Time Budgeter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container" id="app">
    <div class="title-row">
        <h1>Time Budget</h1>
        <div class="header-actions">
            <button class="hdr-btn" id="paletteBtn" title="Cycle color palette">Palette</button>
            <button class="hdr-btn" id="modeBtn" title="Toggle run / edit mode">Run</button>
        </div>
    </div>

    <div class="input-group">
        <label class="section-label">Total Bank of Time (Hours)</label>
        <input type="number" id="totalBank" value="24" min="0" step="0.25">
        <div class="toggle-row">
            <label class="switch">
                <input type="checkbox" id="multitask">
                <span class="track"></span>
            </label>
            <span class="toggle-label">Allow overlapping timers (off = starting one stops the rest)</span>
        </div>
    </div>

    <label class="section-label">Fixed Blocks (Hours)</label>
    <div id="fixedContainer"></div>
    <button class="btn-add" id="addFixedBtn">+ Add Fixed Block</button>

    <label class="section-label">Variable Allocations (%)</label>
    <div id="remainingCaption" class="section-caption"></div>
    <div id="percentContainer"></div>
    <button class="btn-add" id="addPercentBtn">+ Add Percentage Category</button>

    <div class="visualizer-container" id="visualizer"></div>
    <div id="vizCaption" class="viz-caption"></div>
    <div id="warning" class="total-warning">Total percentage exceeds 100%!</div>

    <div class="results-list" id="resultsList"></div>

    <button class="btn-reset" id="resetBtn">Reset the Day</button>
</div>

<div class="toast" id="toast">
    <span id="toastLabel"></span>
    <button id="toastUndo">Undo</button>
</div>

<div class="modal-backdrop" id="resetModal" role="dialog" aria-modal="true" aria-labelledby="resetTitle">
    <div class="modal-card">
        <h2 id="resetTitle">Are you ready to start a new day?</h2>
        <p>This zeros every timer and stops anything still running. Your categories and budgets stay put.</p>
        <div class="modal-actions">
            <button class="btn-confirm" id="modalConfirm" aria-label="Hold to start a new day">
                <span class="htc-fill"></span>
                <span class="htc-label">Hold to start new day</span>
            </button>
            <button class="btn-cancel" id="modalCancel">Not yet</button>
        </div>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
