<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Overlap Budgeter — test harness</title>
<style>
  body { background:#020; color:#0f0; font-family:monospace; white-space:pre-wrap; padding:12px; margin:0; }
  .fail { color:#ff4d4d; }
  .pass { color:#06d6a0; }
  #__summary { font-weight:bold; font-size:1.1rem; margin-bottom:6px; }
</style></head>
<body>
<div id="__summary">running…</div>
<div id="__results"></div>

<!-- The real app, loaded in an iframe. Same-origin so we can reach its globals.
     src is set by the script AFTER wiring the error catcher so init errors are captured. -->
<!-- Laid out but invisible (opacity, not display:none — display:none prevents
     scroll/layout, which breaks the scroll-wheel tests). -->
<iframe id="app" style="position:fixed; top:0; left:0; width:390px; height:844px; opacity:0; z-index:-1; pointer-events:none"></iframe>

<script>
(function(){
  var iframe = document.getElementById('app');
  var results = document.getElementById('__results');
  var summary = document.getElementById('__summary');
  var errors = [];
  var passed = 0, failed = 0;
  function ok(name){ passed++; results.textContent += 'PASS  ' + name + '\n'; }
  function bad(name, why){ failed++; results.textContent += 'FAIL  ' + name + ' :: ' + why + '\n'; }
  function assert(name, cond, why){ cond ? ok(name) : bad(name, why || 'condition false'); }

  // Wire the error catcher on the iframe's window before navigating it, so
  // errors thrown during the app's init() are captured.
  var W = iframe.contentWindow;
  W.addEventListener('error', function(e){
    errors.push((e.message || 'error') + ' @ ' + (e.filename || '').split('/').pop() + ':' + e.lineno);
  });

  iframe.addEventListener('load', function(){
    // The app's top-level let/const (state, segEls) are lexical globals, not on
    // window, so reach them through eval in the iframe's global scope. Function
    // declarations are on window too, but going through eval keeps it uniform.
    var state    = W.eval('state');
    var segEls   = W.eval('segEls');
    var openEditSheet  = W.eval('openEditSheet');
    var closeEditSheet = W.eval('closeEditSheet');
    var openDaySheet   = W.eval('openDaySheet');
    var closeDaySheet   = W.eval('closeDaySheet');
    var updateLive = W.eval('updateLive');
    var nowMs      = W.eval('nowMs');
    var save       = W.eval('save');
    var D = iframe.contentDocument;

    try {
      // 1. Init / run-view home
      assert('no JS errors during init/run', errors.length === 0, errors.join('; '));
      assert('init produced state', state && typeof state === 'object');
      assert('mode-run is the home view', D.getElementById('app').classList.contains('mode-run'));
      assert('modeBtn removed', !D.getElementById('modeBtn'));
      assert('wakeInput removed', !D.getElementById('wakeInput'));
      assert('resultsList present (no bricking)', !!D.getElementById('resultsList'));
      assert('4 fixed rows render', D.querySelectorAll('#fixedContainer .category-row').length === 4, D.querySelectorAll('#fixedContainer .category-row').length + ' rows');
      assert('6 percent rows render', D.querySelectorAll('#percentContainer .category-row').length === 6, D.querySelectorAll('#percentContainer .category-row').length + ' rows');

      // 2. Segment fills (running category fills up)
      var segs = D.querySelectorAll('#tlSegs .segment');
      var fills = D.querySelectorAll('#tlSegs .segment .segment-fill');
      assert('every category segment has a fill child', fills.length === 10, fills.length + ' fills for ' + segs.length + ' segments');

      // 3. NOW line paints the running timer's color; segment + pill fill reflect spent/budget
      var b = state.fixed[0];                  // Breakfast, 0.5h budget
      var orig = { sa: b.startedAt, bk: b.banked };
      b.banked = 0; b.startedAt = nowMs() - 60 * 1000;   // 1 minute spent
      updateLive();
      var nowColor = D.getElementById('tlNow').style.getPropertyValue('--now-color');
      assert('NOW line paints running timer color', nowColor === b.color, 'got ' + nowColor);
      var seg = segEls[b.id];
      var fillW = seg.querySelector('.segment-fill').style.width;
      assert('running segment fill = spent/budget (~3.33%)', fillW.indexOf('3.33') === 0, 'got ' + fillW);
      var row = D.querySelector('.category-row[data-id="' + b.id + '"]');
      var pfW = row.querySelector('.progress-fill').style.width;
      assert('pill fill matches segment fill', pfW.indexOf('3.33') === 0, 'got ' + pfW);
      assert('pill fill has stripe image (used-time like timeline)', !!row.querySelector('.progress-fill').style.backgroundImage, 'no bg image');
      assert('pill shows used-of-budget label', /of\s/.test(row.querySelector('.td-budget').textContent), 'label="' + row.querySelector('.td-budget').textContent + '"');
      b.startedAt = null; b.banked = 60;
      updateLive();
      assert('NOW line clears color on stop', D.getElementById('tlNow').style.getPropertyValue('--now-color') === '', 'still set');

      // 4. Day sheet must NOT overwrite wake/bed on open
      var wakeBefore = state.wake;
      openDaySheet(); closeDaySheet();
      assert('day sheet does not overwrite wake on open', state.wake === wakeBefore, wakeBefore + ' -> ' + state.wake);

      // 5. Day sheet wheels update wake
      openDaySheet();
      var dayWheels = D.querySelectorAll('#dayBody .wheel');
      dayWheels[0].scrollTop = 6 * 40; dayWheels[0].dispatchEvent(new Event('scroll'));      // wake hour = 6
      dayWheels[1].scrollTop = (30/5) * 40; dayWheels[1].dispatchEvent(new Event('scroll'));  // wake min = 30
      assert('day wheel updates wake', state.wake === '06:30', 'wake=' + state.wake);
      assert('day readout shows length', /to spend/.test(D.querySelector('#dayBody .day-readout').textContent), D.querySelector('#dayBody .day-readout').textContent);
      closeDaySheet();

      // 6. Edit fixed: wheels update budget hours
      openEditSheet(state.fixed[0], 'fixed');
      var fw = D.querySelectorAll('#editBody .wheel');
      fw[0].scrollTop = 2 * 40; fw[0].dispatchEvent(new Event('scroll'));      // hours = 2
      fw[1].scrollTop = (30/5) * 40; fw[1].dispatchEvent(new Event('scroll'));  // min = 30
      assert('fixed wheels update hours', state.fixed[0].hours === 2.5, 'hours=' + state.fixed[0].hours);
      closeEditSheet();

      // 7. Edit percent: slider updates percent
      openEditSheet(state.percent[0], 'percent');
      var slider = D.querySelector('#editBody .pct-slider');
      slider.value = 37; slider.dispatchEvent(new Event('input'));
      assert('percent slider updates state', state.percent[0].percent === 37, 'pct=' + state.percent[0].percent);
      assert('percent readout reflects', D.querySelector('#editBody .pct-readout').textContent === '37%', D.querySelector('#editBody .pct-readout').textContent);
      closeEditSheet();

      // 8. Delete is two-tap (armed on first tap)
      var before = state.fixed.length;
      openEditSheet(state.fixed[0], 'fixed');
      var del = D.getElementById('editDelete');
      del.click();
      assert('delete arms on first tap', del.textContent.indexOf('again') >= 0, 'text="' + del.textContent + '"');
      assert('nothing deleted on first tap', state.fixed.length === before, state.fixed.length + ' != ' + before);
      del.click();
      assert('delete removes on second tap', state.fixed.length === before - 1, state.fixed.length + ' != ' + (before-1));
      closeEditSheet();

      // restore Breakfast so repeated runs are stable
      b.startedAt = orig.sa; b.banked = orig.bk; save();

      // 9. "Start day now" sets wake to now, bed to now + slider hours, and erases
      // the day's logged timers. Categories and budgets stay. (Replaces the old
      // Plan/Start-from-NOW mode-switch test — that mode was removed.)
      var pct9 = state.percent[0];
      var orig9 = { wake: state.wake, bed: state.bed, banked: pct9.banked, startedAt: pct9.startedAt, done: pct9.done, usedSec: pct9.usedSec };
      pct9.banked = 300; pct9.startedAt = null; pct9.done = false; pct9.usedSec = 0;
      save();
      W.eval('openStartNowModal()');
      W.eval('startNowSliderEl.value = 2');      // end 2 hours from now
      W.eval('confirmStartNow()');
      var nowM9 = W.eval('nowMin()');
      var wakeMin9 = W.eval('timeToMin(state.wake)');
      var bedMin9 = W.eval('timeToMin(state.bed)');
      var expectBed9 = (nowM9 + 120) % 1440;
      assert('start day now erases logged timers', state.percent[0].banked === 0, 'banked=' + state.percent[0].banked);
      assert('start day now sets wake to ~now', Math.abs(wakeMin9 - nowM9) <= 1, wakeMin9 + ' vs ' + nowM9);
      assert('start day now sets bed to now + slider hours', Math.abs(bedMin9 - expectBed9) <= 1, bedMin9 + ' vs ' + expectBed9);
      assert('nowMode field removed', !('nowMode' in state), 'nowMode present');
      assert('toggleNow removed', W.eval('typeof toggleNow') === 'undefined', 'toggleNow still defined');
      // restore so repeated runs and later sections stay stable
      state.wake = orig9.wake; state.bed = orig9.bed;
      pct9.banked = orig9.banked; pct9.startedAt = orig9.startedAt; pct9.done = orig9.done; pct9.usedSec = orig9.usedSec;
      save();
      updateLive();

      // 10. Only one stopwatch may run at a time.
      var f0 = state.fixed[0], f1 = state.fixed[1];
      var f0Orig = { banked: f0.banked, startedAt: f0.startedAt },
          f1Orig = { banked: f1.banked, startedAt: f1.startedAt };
      f0.banked = 0; f0.startedAt = null; f1.banked = 0; f1.startedAt = null;
      W.eval("toggleBlock('fixed', state.fixed[0].id)");
      var afterFirst = W.eval('runningBlocks().length');
      assert('starting first fixed timer runs one stopwatch', afterFirst === 1, 'got ' + afterFirst);
      W.eval("toggleBlock('fixed', state.fixed[1].id)");
      var afterSecond = W.eval('runningBlocks().length');
      assert('starting second timer stops the first', afterSecond === 1, 'got ' + afterSecond);
      assert('first timer is banked when second starts', state.fixed[0].startedAt === null, 'still running');
      // stop the remaining timer and restore
      W.eval("toggleBlock('fixed', state.fixed[1].id)");
      f0.banked = f0Orig.banked; f0.startedAt = f0Orig.startedAt;
      f1.banked = f1Orig.banked; f1.startedAt = f1Orig.startedAt;
      save();

      // 11. Big readout counts up (stopwatch), not down from budget.
      var f = state.fixed[0];
      var fOrig2 = { banked: f.banked, startedAt: f.startedAt, hours: f.hours };
      f.banked = 60; f.startedAt = nowMs() - 120 * 1000; f.hours = 0.5;   // 3 min elapsed, 30 min budget
      updateLive();
      var big = D.querySelector('.category-row[data-id="' + f.id + '"] .td-elapsed').textContent;
      assert('big display counts up elapsed time', /3/.test(big) && !/27/.test(big), 'display="' + big + '"');
      f.banked = fOrig2.banked; f.startedAt = fOrig2.startedAt; f.hours = fOrig2.hours;
      save();
    } catch (e) {
      failed++;
      results.textContent += 'EXC  ' + (e.message || e) + '\n' + (e.stack || '') + '\n';
    }

    summary.textContent = (failed === 0 ? 'ALL PASS' : (failed + ' FAILED')) + ' (' + passed + ' passed, ' + failed + ' failed)';
    summary.className = failed === 0 ? 'pass' : 'fail';
    document.title = failed === 0 ? 'ALL PASS' : (failed + ' FAILED');
  });

  iframe.src = '/index.html';
})();
</script>
</body>
</html>
